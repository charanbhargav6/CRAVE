name: CRAVE CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11.9"
        cache: 'pip'
        
    - name: Install Logic Dependencies
      run: |
        python -m pip install --upgrade pip
        # We only install the core logic dependencies for automated testing to avoid triggering GPU/CUDA errors on standard GitHub runners.
        pip install requests cryptography bcrypt paramiko schedule numpy python-telegram-bot
        
    - name: Run Core Logic Tests
      run: |
        python -m unittest discover -s tests -p "test_*.py" -v
